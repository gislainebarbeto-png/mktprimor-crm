name: Deploy para Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy-ftp:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          security: loose
          timeout: 120000
          server-dir: crm/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            README.md
            supabase/**
            config.js
            cloudflare-worker/**

  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Cloudflare Worker via API
        working-directory: cloudflare-worker
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/b422fbb4ac4f55a4b91f5bdbd278fb97/workers/scripts/mktprimor-proxy" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -F 'metadata={"main_module":"worker.js","compatibility_date":"2024-01-01","bindings":[]};type=application/json' \
            -F 'worker.js=@worker.js;type=application/javascript+module' \
            --fail-with-body \
            --silent \
            --show-error
